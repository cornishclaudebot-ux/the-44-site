name: Update events from Posh

on:
  schedule:
    - cron: "17 14 * * *" # 7:17am Phoenix, daily (AZ has no DST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-events:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Pull latest events from Posh
        run: node scripts/update-events.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet events.json; then
            echo "events.json unchanged, nothing to deploy."
          else
            git config user.name "the44-events-bot"
            git config user.email "actions@users.noreply.github.com"
            git add events.json
            git commit -m "Auto-update events from Posh ($(date -u +%Y-%m-%d))"
            git push
          fi
